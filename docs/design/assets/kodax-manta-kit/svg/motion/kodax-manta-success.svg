<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc" style="">
  <title id="title">KodaX Manta Pulse — success</title>
  <desc id="desc">Animated KodaX Manta Pulse logo. Motion is disabled when reduced motion is requested.</desc>
  <defs>
  <linearGradient id="wing-left" x1="16" y1="112" x2="132" y2="112" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#2FE58D"/>
    <stop offset="0.58" stop-color="#00C98A"/>
    <stop offset="1" stop-color="#081420"/>
  </linearGradient>
  <linearGradient id="wing-right" x1="124" y1="112" x2="242" y2="112" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#081420"/>
    <stop offset="0.48" stop-color="#00C98A"/>
    <stop offset="1" stop-color="#2FE58D"/>
  </linearGradient>
  <linearGradient id="spine-gradient" x1="128" y1="50" x2="128" y2="246" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#F5FBFF"/>
    <stop offset="0.38" stop-color="#D8FFF0"/>
    <stop offset="1" stop-color="#2FE58D"/>
  </linearGradient>
  <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="wide-glow" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="8" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
  <style>
  :root { --accent:#00ECFF; --secondary:#0A7CFF; --light:#6EFFF0; }
  #manta, #wing-left, #wing-right, #core, #tail, .ring, .orbit, .spark, .satellite, .burst { transform-box:view-box; }
  #manta { transform-origin:128px 120px; }
  #wing-left, #wing-right { transform-origin:128px 120px; }
  #core { transform-origin:128px 104px; }
  #tail { transform-origin:128px 116px; }
  .ring { transform-origin:128px 206px; }
  @media (prefers-reduced-motion: reduce) { * { animation:none !important; } }


  :root{--accent:#2FE58D;--secondary:#00C98A;--light:#D8FFF0}
  #manta { animation:success-rise 2.4s ease-out infinite; }
  #core { animation:success-core 2.4s ease-out infinite; }
  .burst { transform-origin:128px 104px; animation:success-burst 2.4s ease-out infinite; }
  .check { stroke-dasharray:40; animation:draw-check 2.4s ease-out infinite; }
  @keyframes success-rise { 0%{transform:translateY(5px) scale(.96)} 18%{transform:translateY(-5px) scale(1.04)} 38%,100%{transform:none} }
  @keyframes success-core { 0%{transform:scale(.2);opacity:0} 22%{transform:scale(1.55);opacity:1} 45%,100%{transform:scale(1)} }
  @keyframes success-burst { 0%{transform:scale(.15) rotate(0);opacity:0} 24%{opacity:1} 58%,100%{transform:scale(1.7) rotate(24deg);opacity:0} }
  @keyframes draw-check { 0%,18%{stroke-dashoffset:40;opacity:0} 40%,100%{stroke-dashoffset:0;opacity:1} }
</style>
  
  <g id="manta" filter="url(#glow)">
  <path id="wing-left" d="M128 36 C108 55 96 78 76 94 C58 109 34 116 14 120 C38 125 60 134 82 148 C101 161 116 176 128 190 C124 148 124 86 128 36 Z" fill="url(#wing-left)"/>
  <path id="wing-right" d="M128 36 C148 55 160 78 180 94 C198 109 222 116 242 120 C218 125 196 134 174 148 C155 161 140 176 128 190 C132 148 132 86 128 36 Z" fill="url(#wing-right)"/>
  <path id="outline" d="M128 36 C108 55 96 78 76 94 C58 109 34 116 14 120 C38 125 60 134 82 148 C101 161 116 176 128 190 C140 176 155 161 174 148 C196 134 218 125 242 120 C222 116 198 109 180 94 C160 78 148 55 128 36 Z" fill="none" stroke="#2FE58D" stroke-opacity=".75" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <path id="spine" d="M128 52 L128 194" fill="none" stroke="url(#spine-gradient)" stroke-width="3.2" stroke-linecap="round"/>
  <path id="tail" d="M128 112 C128 145 124 177 128 198 C131 216 144 222 150 230 C154 235 156 240 154 246" fill="none" stroke="url(#spine-gradient)" stroke-width="3.2" stroke-linecap="round"/>
  <path id="core" d="M128 74 C130 89 136 98 148 104 C136 109 130 119 128 136 C126 119 120 109 108 104 C120 98 126 89 128 74 Z" fill="#D8FFF0"/>
</g>
  <g class="burst" stroke="#D8FFF0" stroke-width="2" stroke-linecap="round" filter="url(#wide-glow)">
  <path d="M128 42 V58 M128 150 V166 M66 104 H82 M174 104 H190 M84 60 L96 72 M160 136 L172 148 M172 60 L160 72 M96 136 L84 148"/>
</g>
<circle cx="210" cy="48" r="21" fill="#072A20" stroke="#2FE58D" stroke-width="2"/>
<path class="check" d="M199 48 L207 56 L222 39" fill="none" stroke="#D8FFF0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
