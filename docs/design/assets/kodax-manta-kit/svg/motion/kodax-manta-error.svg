<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc" style="">
  <title id="title">KodaX Manta Pulse — error and recovery</title>
  <desc id="desc">Animated KodaX Manta Pulse logo. Motion is disabled when reduced motion is requested.</desc>
  <defs>
  <linearGradient id="wing-left" x1="16" y1="112" x2="132" y2="112" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#FF4D5A"/>
    <stop offset="0.58" stop-color="#B91C3B"/>
    <stop offset="1" stop-color="#081420"/>
  </linearGradient>
  <linearGradient id="wing-right" x1="124" y1="112" x2="242" y2="112" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#081420"/>
    <stop offset="0.48" stop-color="#B91C3B"/>
    <stop offset="1" stop-color="#FF4D5A"/>
  </linearGradient>
  <linearGradient id="spine-gradient" x1="128" y1="50" x2="128" y2="246" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#F5FBFF"/>
    <stop offset="0.38" stop-color="#FFD6DA"/>
    <stop offset="1" stop-color="#FF4D5A"/>
  </linearGradient>
  <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="wide-glow" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="8" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
  <style>
  :root { --accent:#00ECFF; --secondary:#0A7CFF; --light:#6EFFF0; }
  #manta, #wing-left, #wing-right, #core, #tail, .ring, .orbit, .spark, .satellite, .burst { transform-box:view-box; }
  #manta { transform-origin:128px 120px; }
  #wing-left, #wing-right { transform-origin:128px 120px; }
  #core { transform-origin:128px 104px; }
  #tail { transform-origin:128px 116px; }
  .ring { transform-origin:128px 206px; }
  @media (prefers-reduced-motion: reduce) { * { animation:none !important; } }


  :root{--accent:#FF4D5A;--secondary:#B91C3B;--light:#FFD6DA}
  #manta { animation:error-jitter 1.8s steps(1,end) infinite; }
  #core { animation:error-core .55s ease-in-out infinite alternate; }
  .glitch { animation:glitch 1.8s steps(1,end) infinite; }
  .recover { stroke-dasharray:150; animation:recover 1.8s ease-in-out infinite; }
  @keyframes error-jitter { 0%,18%,36%,100%{transform:translate(0)} 20%{transform:translate(-4px,1px)} 22%{transform:translate(3px,-1px)} 38%{transform:translate(2px,1px)} 40%{transform:translate(-2px)} }
  @keyframes error-core { from{transform:scale(.72);opacity:.55} to{transform:scale(1.25);opacity:1} }
  @keyframes glitch { 0%,18%,24%,36%,42%,100%{opacity:0;transform:translateX(0)} 20%{opacity:.8;transform:translateX(8px)} 38%{opacity:.65;transform:translateX(-7px)} }
  @keyframes recover { 0%,48%{stroke-dashoffset:150;opacity:0} 62%{opacity:1} 100%{stroke-dashoffset:0;opacity:.8} }
</style>
  
  <g id="manta" filter="url(#glow)">
  <path id="wing-left" d="M128 36 C108 55 96 78 76 94 C58 109 34 116 14 120 C38 125 60 134 82 148 C101 161 116 176 128 190 C124 148 124 86 128 36 Z" fill="url(#wing-left)"/>
  <path id="wing-right" d="M128 36 C148 55 160 78 180 94 C198 109 222 116 242 120 C218 125 196 134 174 148 C155 161 140 176 128 190 C132 148 132 86 128 36 Z" fill="url(#wing-right)"/>
  <path id="outline" d="M128 36 C108 55 96 78 76 94 C58 109 34 116 14 120 C38 125 60 134 82 148 C101 161 116 176 128 190 C140 176 155 161 174 148 C196 134 218 125 242 120 C222 116 198 109 180 94 C160 78 148 55 128 36 Z" fill="none" stroke="#FF4D5A" stroke-opacity=".75" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <path id="spine" d="M128 52 L128 194" fill="none" stroke="url(#spine-gradient)" stroke-width="3.2" stroke-linecap="round"/>
  <path id="tail" d="M128 112 C128 145 124 177 128 198 C131 216 144 222 150 230 C154 235 156 240 154 246" fill="none" stroke="url(#spine-gradient)" stroke-width="3.2" stroke-linecap="round"/>
  <path id="core" d="M128 74 C130 89 136 98 148 104 C136 109 130 119 128 136 C126 119 120 109 108 104 C120 98 126 89 128 74 Z" fill="#FFD6DA"/>
</g>
  <g class="glitch" stroke="#FFD6DA" stroke-width="3" opacity="0">
  <path d="M30 92 H102 M150 92 H232"/><path d="M18 128 H88 M168 128 H242"/><path d="M56 154 H116 M140 154 H206"/>
</g>
<path class="recover" d="M62 214 C90 234 165 236 195 204" fill="none" stroke="#FFD6DA" stroke-width="2" stroke-linecap="round"/>
<path class="recover" d="M188 198 L196 204 L190 213" fill="none" stroke="#FFD6DA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
