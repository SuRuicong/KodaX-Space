# Release workflow — F010
#
# 触发方式：
#   1. workflow_dispatch (manual)：手动跑，artifact 上传到 workflow run（不发 Release）
#   2. push tag v* (e.g. v0.1.0-alpha.0)：自动 build + 创建 GitHub Release，artifact 上传到 Release
#
# 矩阵：windows-latest + macos-latest + ubuntu-latest 各跑一次
# 跑时长预期：每个 OS ~10-15 分钟（含 npm install + electron-builder + asar）
#
# v0.1.3.1 修复（2026-06-02）：默认 prerelease=false。之前 `prerelease: true` hardcode
# 让 GitHub 主页不显示 Latest release + electron-updater (releaseType: release) 找不到
# 任何 release → F022 自动更新实际从来没工作过。Body 里仍保留 unsigned 警告，用户首次
# 启动看到 OS warning（Gatekeeper / SmartScreen）就够明示了。
# 真要标 prerelease（v0.x.y-rc.N 这种），手动 workflow_dispatch 时传 mark_as_prerelease=true。

name: release

on:
  workflow_dispatch:
    inputs:
      mark_as_prerelease:
        description: 'Mark Release as prerelease (rare — only for rc / beta tags)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']
  push:
    tags:
      - 'v*'

permissions:
  contents: write # need to create Release + upload assets

env:
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  build:
    name: Build installer (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_glob: 'out/*.exe'
            build_script: build:win
          - os: macos-latest
            artifact_glob: 'out/*.dmg'
            build_script: build:mac
          - os: ubuntu-latest
            artifact_glob: 'out/*.AppImage out/*.deb'
            build_script: build:linux
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build workspace packages
        run: npm run build:packages

      - name: Typecheck (gate before pack)
        run: npm run typecheck
        # rootDir cross-reference issue in composeMessages.test (pre-F009 bug,
        # tracked separately) — allow non-fatal until that's fixed
        continue-on-error: true

      - name: Configure npm script-shell (Windows)
        if: runner.os == 'Windows'
        # npm 默认在 Windows 用 cmd.exe 跑 script —— cmd 不展开 `electron/test/*.test.ts`
        # glob，node 收到字面量 '*.test.ts' 报 "Could not find"。把 npm 的 script-shell
        # 改成 bash，让 Git Bash 展 glob（macOS/Linux 默认就是 bash）。
        shell: bash
        run: npm config set script-shell bash

      - name: Unit tests
        shell: bash
        # SKIP_PTY_TESTS=1: F011 PTY 单测 spawn 真 shell，CI headless 环境（特别是 macOS）
        # spawn /bin/zsh 时 PTY 行为不稳，本地 dev 机器跑得通；CI 上跳过这 8 个测试，
        # 不阻塞 release pipeline。逻辑正确性靠本地 dev 验证 + 出包 smoke + 用户实际运行。
        env:
          SKIP_PTY_TESTS: '1'
        run: npm test

      - name: Build installer
        run: npm run ${{ matrix.build_script }}
        # 不传 GH_TOKEN —— electron-builder 检测到 GH_TOKEN + tag push 会自动开启 GitHub
        # Publisher 创建 draft release 上传 artifact，跟 release job 的 action-gh-release
        # 撞同一 tag 导致 'already_exists' 失败。build script 已加 `-p never` 双保险。
        env:
          # 关闭 native rebuild 在 CI（keytar 在 v0.1.0 是 optional + memory fallback）
          npm_config_build_from_source: 'false'

      - name: Smoke check installer
        run: npm run smoke:pack

      # 拦"installer build 通过但 renderer 启动崩"这一类 v0.1.7-shape regression：
      # 真起 packed Electron + 等 5s + 抓 console.error / pageerror / React 错误码。
      # 只在 Linux runner 跑一次就够（renderer JS bundle 跨平台一致），用 xvfb 给 X display。
      - name: Install xvfb for renderer boot smoke (Linux only)
        if: matrix.os == 'ubuntu-latest'
        # --no-install-recommends 跳掉非必要 deps，省 ~10s（xvfb 通常已预装在 ubuntu-latest runner 上）
        run: sudo apt-get install -y --no-install-recommends xvfb

      - name: Renderer boot smoke (last gate before release)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        env:
          KODAX_FORCE_MOCK: '1'
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x800x24" npx playwright test tests/e2e/renderer-boot.spec.ts --reporter=list

      - name: Upload installer artifacts (workflow_dispatch path)
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: |
            out/*.exe
            out/*.dmg
            out/*.AppImage
            out/*.deb
            out/*.blockmap
            out/latest*.yml
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Stage release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.exe' -o -name '*.dmg' -o -name '*.AppImage' -o -name '*.deb' -o -name '*.blockmap' -o -name 'latest*.yml' \) -exec mv {} release/ \;
          ls -la release/

      - name: Generate release notes from changelog
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags --prune >/dev/null 2>&1 || true

          node <<'NODE'
          const fs = require('node:fs');
          const cp = require('node:child_process');

          const tag = process.env.GITHUB_REF_NAME || '';
          const version = tag.replace(/^v/, '');
          const repository = process.env.GITHUB_REPOSITORY || 'icetomoyo/KodaX-Space';

          if (!/^v?\d+\.\d+\.\d+/.test(tag)) {
            throw new Error(`Unsupported release tag: ${tag}`);
          }

          const escapeRegExp = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
          const heading = new RegExp(`^## \\[${escapeRegExp(version)}\\][^\\n]*\\n`, 'm');
          const match = heading.exec(changelog);

          if (!match) {
            throw new Error(`CHANGELOG.md does not contain a section for ${version}`);
          }

          const bodyStart = match.index + match[0].length;
          const remainder = changelog.slice(bodyStart);
          const nextHeading = remainder.search(/^## \[[^\]]+\]/m);
          const releaseChangelog = (nextHeading >= 0 ? remainder.slice(0, nextHeading) : remainder).trim();

          let previousTag = '';
          try {
            const tags = cp
              .execSync('git tag --list "v[0-9]*" --sort=-v:refname', { encoding: 'utf8' })
              .trim()
              .split(/\r?\n/)
              .filter(Boolean);
            const currentIndex = tags.indexOf(tag);
            previousTag = currentIndex >= 0 ? tags[currentIndex + 1] || '' : '';
          } catch {
            previousTag = '';
          }

          const fullChangelog = previousTag
            ? `\n\n**Full Changelog**: https://github.com/${repository}/compare/${previousTag}...${tag}\n`
            : '';

          const notes = [
            `# KodaX Space ${tag}`,
            '',
            releaseChangelog,
            '',
            '---',
            '',
            '## Installation Notes',
            '',
            '> **Unsigned installers:** first launch may trigger OS trust prompts.',
            '',
            '- Windows: SmartScreen -> click "More info" -> "Run anyway"',
            '- macOS: Gatekeeper -> right-click -> Open -> confirm',
            '- Linux: `chmod +x *.AppImage` then run; or `sudo dpkg -i *.deb`',
            '',
            'KodaX Space is a local-first tool for trusted users; installers remain unsigned for this release.',
            '',
            '## Verify Checksums',
            '',
            `SHA256 values are included in the uploaded \`latest*.yml\` electron-updater manifests.${fullChangelog}`,
          ].join('\n');

          fs.writeFileSync('release-notes.md', `${notes.trim()}\n`);
          NODE

          sed -n '1,120p' release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          # tag push → 正式 release；Release body 优先展示 CHANGELOG，安装签名提示放在后置说明。
          # workflow_dispatch → 用户输入决定（默认 false）
          prerelease: ${{ github.event.inputs.mark_as_prerelease == 'true' }}
          files: release/*
          body_path: release-notes.md
