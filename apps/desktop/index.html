<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KodaX Space</title>
    <style>
      :root {
        --boot-bg: #f7f7f8;
        --boot-panel: #ffffff;
        --boot-fg: #1a1a1f;
        --boot-muted: #6f6f78;
        --boot-border: rgba(17, 17, 20, 0.09);
        --boot-accent: #a56808;
        --boot-accent-soft: rgba(245, 166, 35, 0.22);
      }

      html.dark {
        --boot-bg: #0b0b0d;
        --boot-panel: #151518;
        --boot-fg: #ededef;
        --boot-muted: #a6a6ae;
        --boot-border: rgba(255, 255, 255, 0.08);
        --boot-accent: #f5b544;
        --boot-accent-soft: rgba(245, 181, 68, 0.2);
      }

      body {
        background: var(--boot-bg);
      }

      .boot-splash {
        min-height: 100vh;
        display: grid;
        place-items: center;
        color: var(--boot-fg);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 42%), var(--boot-bg);
        -webkit-app-region: drag;
      }

      .boot-splash-inner {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 16px;
        border: 1px solid var(--boot-border);
        background: var(--boot-panel);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.18);
      }

      .boot-mark {
        width: 32px;
        height: 32px;
        display: grid;
        place-items: center;
        flex: 0 0 auto;
        border: 1px solid var(--boot-border);
        background: var(--boot-accent-soft);
        color: var(--boot-accent);
        font:
          700 15px/1 ui-sans-serif,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      .boot-copy {
        min-width: 0;
      }

      .boot-title {
        font:
          600 13px/1.25 ui-sans-serif,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      .boot-status {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 3px;
        color: var(--boot-muted);
        font:
          12px/1.3 ui-sans-serif,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      .boot-spinner {
        width: 12px;
        height: 12px;
        border-radius: 999px;
        box-sizing: border-box;
        border: 2px solid var(--boot-accent-soft);
        border-top-color: var(--boot-accent);
        animation: boot-spin 900ms linear infinite;
      }

      @keyframes boot-spin {
        to {
          transform: rotate(1turn);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .boot-spinner {
          animation: none;
        }
      }
    </style>
    <script>
      // 提前根据 localStorage 同步加 'dark' class，避免 React 挂载前的 light flash。
      // 默认 dark — 与 alpha.1 之前版本一致。
      (function () {
        try {
          var t = localStorage.getItem('kodax-space.theme') || 'dark';
          var effective = t;
          if (t === 'system' && window.matchMedia) {
            effective = window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
          }
          if (effective === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
        // F060 视觉质量档：挂载前同步 q-* class，避免玻璃/aurora 闪烁。默认 balanced。
        try {
          var q = localStorage.getItem('kodax-space.visualQuality');
          if (q !== 'minimal' && q !== 'balanced' && q !== 'full') q = 'balanced';
          document.documentElement.classList.add('q-' + q);
        } catch (e) {
          document.documentElement.classList.add('q-balanced');
        }
      })();
    </script>
  </head>
  <body class="bg-zinc-950 text-zinc-100">
    <div id="root">
      <div class="boot-splash" role="status" aria-live="polite">
        <div class="boot-splash-inner">
          <div class="boot-mark" aria-hidden="true">K</div>
          <div class="boot-copy">
            <div class="boot-title">KodaX Space</div>
            <div class="boot-status">
              <span class="boot-spinner" aria-hidden="true"></span>Starting up
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/renderer/src/main.tsx"></script>
  </body>
</html>
