# electron-builder configuration — unsigned installer（自家工具，不走"陌生用户公开 Beta"）
# 原 FEATURE_027 签名 + notarize 计划已于 2026-06-05 移除，KodaX Space 定位为
# 自家与可信用户使用，OS 首启的 Gatekeeper / SmartScreen 警告由用户手动 Open 接受。
#
# 产物（F010）：
#   - Windows:  out/KodaX Space-Setup-${version}.exe       (NSIS 安装版, x64)
#               out/KodaX Space-Portable-${version}.exe    (Portable 单文件免安装版, x64)
#   - macOS:    out/KodaX-Space-${version}-${arch}.dmg     (DMG, x64 + arm64)
#   - Linux:    out/KodaX-Space-${version}.AppImage        (AppImage, x64)
#               out/KodaX-Space_${version}_amd64.deb       (deb, x64)
#
# 体积目标：< 200 MB（asar 压缩 + 排除 test/cache/source map）

appId: ai.kodax.space
productName: KodaX Space
copyright: Copyright © 2026 icetomoyo

directories:
  output: out
  buildResources: resources

files:
  - 'dist-electron/**/*'
  - 'apps/desktop/dist/**/*'
  - 'packages/*/dist/**/*'
  # Runtime-loaded native keychain module. The Electron main bundle imports this
  # dynamically, so electron-builder will not discover it from static imports.
  - 'node_modules/@napi-rs/keyring/**/*'
  - 'node_modules/@napi-rs/keyring-*/**/*'
  # SQLite catalog for artifact metadata. better-sqlite3 is externalized from
  # the main bundle and loads a native binding at runtime.
  - 'node_modules/better-sqlite3/**/*'
  # ...but drop the ~44 MB of build residue electron-builder would otherwise
  # ship: the sqlite amalgamation (deps/), the C++ sources (src/), and the whole
  # MSVC build tree (build/** — intermediate obj/tlog/.iobj/.ipdb/.pdb/.lib,
  # vcxproj, and test_extension.* artifacts). Only the compiled binding
  # build/Release/better_sqlite3.node (~1.9 MB) is loaded at runtime, so
  # re-include just that one file after excluding the tree. (electron-builder
  # auto-includes the full production dependency, so an allowlist alone does not
  # trim it — explicit excludes are required.)
  - '!**/node_modules/better-sqlite3/deps/**'
  - '!**/node_modules/better-sqlite3/src/**'
  - '!**/node_modules/better-sqlite3/build/**'
  - 'node_modules/better-sqlite3/build/Release/better_sqlite3.node'
  - 'node_modules/bindings/**/*'
  - 'node_modules/file-uri-to-path/**/*'
  - 'package.json'
  - '!**/node_modules/*/{CHANGELOG.md,README.md,readme.md,HISTORY.md,LICENSE,license,*.d.ts.map}'
  - '!**/node_modules/.cache/**'
  # 只排除 100% 测试框架约定目录（jest 的 __tests__/__mocks__，永不属于运行时）。
  # ⚠️ 绝不按 doc/docs/test/example 这种"看着像非运行时"的目录名盲删 node_modules——
  # 这些名字可能是包的运行时代码：例如 yaml 的 dist/doc/ 含 directives.js / Document.js，
  # 被 compose/composer.js `require('../doc/directives.js')`。曾用 doc 通配把它删掉，导致打包后
  # SDK 加载即 "Cannot find module '../doc/directives.js'"、主进程崩、窗口不创建。
  # 源码/文档/sourcemap 的体积裁剪已由下面的 *.md / *.map / *.ts 扩展名规则安全覆盖（按文件不按目录）。
  - '!**/__tests__/**'
  - '!**/__mocks__/**'
  - '!**/*.{md,markdown}'
  - '!**/*.map'
  - '!**/*.pdb'
  - '!**/.bin/**'
  - '!**/*.{ts,tsx,scss,less}'
  # 安全兜底：放宽目录排除后，显式挡掉任何依赖里可能夹带的凭据文件（避免被打进 asar 安装包）。
  - '!**/.env'
  - '!**/.env.*'
  - '!**/*.{key,pem}'
  - '!**/{credentials,secrets}.json'

asar: true

# Ship only the Electron/Chromium framework locales the app actually uses
# (the renderer's own zh/en i18n is bundled in JS and is unaffected). Electron
# bundles ~55 locale .pak files (~47 MB raw); restricting to en-US + zh-CN
# trims the rest. Chromium's built-in chrome (context menus, etc.) falls back to
# en-US for any unlisted locale, which is fine for a zh/en product.
electronLanguages:
  - en-US
  - zh-CN

extraResources:
  - from: resources/kodax-license-policy.json
    to: kodax-license-policy.json
  # Built-in Terminal uses node-pty from the desktop workspace. Keeping it as an
  # extra resource avoids electron-builder trying to rebuild this workspace-only
  # native dependency while still placing it on Node's runtime module path
  # (resources/node_modules) for require('node-pty') from app.asar.
  - from: node_modules/node-pty
    to: node_modules/node-pty
    filter:
      - 'package.json'
      - 'lib/**/*'
      - 'prebuilds/**/*'
      - 'build/Release/*.node'
      - 'build/Release/conpty/**/*'
      - 'build/Release/spawn-helper'
      - 'build/Release/winpty-agent.exe'
      - 'build/Release/winpty.dll'
      - '!prebuilds/**/*.pdb'
      - '!**/*.map'
      - '!**/*.{md,markdown}'
      - '!**/*.{ts,tsx}'

# build:smoke 已经把 renderer + main 全 bundle 进 dist*。
# native 模块（keytar 等）走 asarUnpack——asar 内 require .node 会失败
asarUnpack:
  - '**/*.node'
  - '**/node_modules/@napi-rs/keyring-*/**'
  - '**/node_modules/better-sqlite3/**'
  # Keep better-sqlite3's native-binding resolver chain on the filesystem next to
  # the unpacked .node (tiny: ~25 KB) so require('bindings') never has to cross
  # the asar boundary.
  - '**/node_modules/bindings/**'
  - '**/node_modules/file-uri-to-path/**'

afterPack: scripts/after-pack-win-rcedit.cjs

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
  # 不签名（FEATURE_027 已 drop）
  identity: null
  hardenedRuntime: false
  icon: resources/icon.png # electron-builder 自动从 PNG 生成 icns
  artifactName: '${productName}-${version}-${arch}.${ext}'

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  # Keep the built-in sign/edit step disabled for unsigned builds. The
  # afterPack hook edits only the main exe resources so Windows process/task
  # lists show KodaX Space instead of Electron without pulling winCodeSign.
  signAndEditExecutable: false
  icon: resources/icon.png # electron-builder 自动从 PNG 生成 ico（256x256+）
  # ⚠️ artifactName 不放在 win 顶层 —— 否则 nsis / portable 两个 target 共用同名 → 产物互相覆盖。
  # 每个 target 块各自指定 artifactName。

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  # 卸载时清理 %APPDATA%/kodax-space —— 不留 user data 残留
  deleteAppDataOnUninstall: true
  shortcutName: KodaX Space
  artifactName: '${productName}-Setup-${version}.${ext}'

# Portable 单文件免安装版（F010 v0.1.9 起）：双击直接运行，无需安装、无写注册表。
# 数据目录：便携版**与 dev / 安装版一致，都用 ~/.kodax**（不再跟随 exe 目录）。
# 早期版本曾按 PORTABLE_EXECUTABLE_DIR 把 Space 数据重定向到 <exe>/.kodax，但 SDK 的
# sessions 不跟随 → 便携版里"session 正常、workflow 全空"的半便携不一致。现已取消该重定向
# （见 apps/desktop/electron/kodax/data-paths.ts）。需要独立数据档用 KODAX_PROFILE_DIR。
portable:
  artifactName: '${productName}-Portable-${version}.${ext}'

linux:
  category: Development
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: resources/icon.png
  artifactName: '${productName}-${version}-${arch}.${ext}'
  synopsis: Provider-neutral, local-first AI agent desktop client
  description: KodaX Space — desktop client for the KodaX ecosystem (Coder + Partner dual-panel).
  maintainer: icetomoyo <icetomoyo@gmail.com>
  vendor: icetomoyo

extraMetadata:
  main: dist-electron/main.js

# F021 v0.1.5：把 Space 注册为 .mcpb / .dxt 的默认应用。
# - macOS：electron-builder 把这两条扩展自动转 CFBundleDocumentTypes / UTExportedTypeDeclarations 入 Info.plist
# - Windows：写注册表项 HKCU\Software\Classes\.mcpb / .dxt → 关联 Space
# - Linux：写 .desktop MimeType（部分发行版兼容，未列在 mime-info 数据库的需用户配置）
#
# 双击 / Open With 触发 OS 路由到 Space main 进程：
#   - macOS：app.on('open-file', ...)
#   - Windows / Linux：second-instance 拿 argv，或冷启动 process.argv 拿
# main 拿到 path 后调 ipc/mcpb.installMcpb 走跟"Install ext"按钮同款流程。
fileAssociations:
  - ext: mcpb
    name: MCP Bundle
    description: KodaX MCP Desktop Extension
    role: Editor
  - ext: dxt
    name: Desktop Extension
    description: Anthropic Desktop Extension
    role: Editor

# 自动更新 channel —— F022 (v0.1.3)
# 走 GitHub Releases，latest.yml / latest-mac.yml / latest-linux.yml
# 由 electron-builder 在 publish 时自动生成 + 上传。
# electron-updater 在 main 进程通过本配置定位 release feed。
publish:
  - provider: github
    owner: icetomoyo
    repo: KodaX-Space
    releaseType: release

# 不内嵌 KodaX-private 任何代码（见 HLD §18）
# KodaX SDK 通过 node_modules 引入 (FEATURE_003)
